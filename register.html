<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register - Sistem Laporan</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f5f6f8;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:Arial;
}

.register-box{
background:white;
padding:40px;
border-radius:10px;
width:100%;
max-width:400px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

.register-title{
text-align:center;
margin-bottom:20px;
font-weight:bold;
}

.btn-register{
background:#1f8ea7;
color:white;
}

.btn-register:hover{
background:#166b7d;
}

</style>

</head>

<body>

<div class="register-box">

<h3 class="register-title">Register Akun</h3>

<form>

<div class="mb-3">
<label class="form-label">Nama</label>
<input type="text" class="form-control" placeholder="Nama lengkap">
</div>

<div class="mb-3">
<label class="form-label">Email</label>
<input type="email" class="form-control" placeholder="Masukkan email">
</div>

<div class="mb-3">
<label class="form-label">Password</label>
<input type="password" class="form-control" placeholder="Buat password">
</div>

<a href="dashboard.html" class="btn btn-register w-100">Register</a>

</form>

<div class="text-center mt-3">
Sudah punya akun? 
<a href="login.html">Login</a>
</div>

</div>

</body>
</html>
